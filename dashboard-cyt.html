<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProyectosCyT · Dashboard Ciencia y Tecnología</title>
<style>
  :root { --bg:#080808; --surface:#121212; --border:rgba(255,255,255,.08); --text:#f0f0f0; --muted:#8b93a1; --lime:#aaff00; --blue:#00d4ff; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
  .wrap { max-width:900px; margin:0 auto; padding:28px 20px 40px; }
  .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .logo { font-weight:800; letter-spacing:.2px; }
  .logo .lex { color:var(--lime); }
  .logo .ar { color:#8a8f99; }
  .back { color:var(--muted); text-decoration:none; border:1px solid var(--border); border-radius:10px; padding:8px 12px; font-size:13px; }
  .back:hover { border-color:rgba(170,255,0,.35); color:var(--lime); }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:26px; }
  h1 { font-size:34px; line-height:1.1; margin-bottom:10px; font-weight:800; }
  p { color:var(--muted); line-height:1.6; max-width:62ch; }
  .tag { display:inline-block; margin-top:14px; font-size:12px; color:var(--blue); border:1px solid rgba(0,212,255,.35); border-radius:999px; padding:5px 10px; }
</style>
<link rel="stylesheet" href="smooth-cursor.css">
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="logo">ProyectosCyT</div>
      <a class="back" href="index.html">← Volver al inicio</a>
    </div>
    <div class="card">
      <h1>Dashboard de Ciencia y Tecnología</h1>
      <p>Este apartado quedó listo como base para cargar los proyectos de Ciencia y Tecnología. Cuando me pases los datos, te lo conecto con estructura completa (KPIs, semáforo, tortas y tabla).</p>
      <span class="tag">Próximamente</span>
    </div>
  </div>
<script src="smooth-cursor.js"></script>
</body>
</html>
